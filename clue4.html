<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐣 Pista 4 – Caça ao Ovo de Páscoa!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #E8F4FD 0%, #E3F2FD 40%, #F0FFF4 100%);
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    .star-bg {
      position: fixed;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      animation: twinkle linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0.2;
        transform: scale(1);
      }

      50% {
        opacity: 0.9;
        transform: scale(1.5);
      }
    }

    .egg {
      position: fixed;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      opacity: 0.18;
      animation: floatEgg linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes floatEgg {
      0% {
        transform: translateY(110vh) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 0.18;
      }

      90% {
        opacity: 0.18;
      }

      100% {
        transform: translateY(-15vh) rotate(360deg);
        opacity: 0;
      }
    }

    .bunny-wrap {
      position: fixed;
      bottom: -10px;
      right: -80px;
      left: auto;
      z-index: 2;
      animation: bunnyJumpRight 8s ease-in-out infinite;
    }

    @keyframes bunnyJumpRight {
      0% {
        right: -80px;
      }

      45% {
        right: calc(100vw + 80px);
      }

      46% {
        right: calc(100vw + 80px);
        opacity: 0;
      }

      47% {
        right: -80px;
        opacity: 0;
      }

      48% {
        opacity: 1;
      }

      100% {
        right: -80px;
      }
    }

    .bunny {
      width: 90px;
      animation: bunnyBounce 0.4s ease-in-out infinite alternate;
      transform: scaleX(-1);
    }

    @keyframes bunnyBounce {
      from {
        transform: scaleX(-1) translateY(0px);
      }

      to {
        transform: scaleX(-1) translateY(-18px);
      }
    }

    .card {
      position: relative;
      z-index: 10;
      max-width: 480px;
      margin: 0 auto;
      padding: 28px 24px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      justify-content: center;
    }

    .badge {
      background: linear-gradient(135deg, #4FC3F7, #29B6F6);
      color: #fff;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      padding: 6px 20px;
      border-radius: 50px;
      margin-bottom: 16px;
      letter-spacing: 1px;
      box-shadow: 0 4px 14px rgba(79, 195, 247, 0.4);
    }

    .title {
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      color: #0277BD;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 2px 2px 0px #B3E5FC;
    }

    .subtitle {
      font-size: 1rem;
      color: #0277BD;
      text-align: center;
      margin-bottom: 28px;
      opacity: 0.8;
    }

    .clue-box {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(79, 195, 247, 0.2);
      border: 3px solid #B3E5FC;
      width: 100%;
      text-align: center;
    }

    .clue-icon {
      font-size: 3.5rem;
      margin-bottom: 14px;
      display: block;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .clue-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1A237E;
      line-height: 1.65;
    }

    .clue-text em {
      color: #0277BD;
      font-style: normal;
    }

    .planets {
      margin: 16px 0;
      font-size: 1.6rem;
      letter-spacing: 4px;
      animation: floatPlanets 3s ease-in-out infinite alternate;
    }

    @keyframes floatPlanets {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-6px);
      }
    }

    .stars {
      margin-top: 22px;
      font-size: 1.6rem;
      letter-spacing: 6px;
    }

    .footer-eggs {
      margin-top: 32px;
      font-size: 2rem;
      opacity: 0.5;
      letter-spacing: 8px;
    }
  </style>
</head>

<body>

  <!-- Stars in background -->
  <div class="star-bg" style="left:5%;top:10%;animation-duration:3s;"></div>
  <div class="star-bg" style="left:20%;top:20%;animation-duration:2s;animation-delay:0.5s;"></div>
  <div class="star-bg" style="left:40%;top:8%;animation-duration:4s;animation-delay:1s;"></div>
  <div class="star-bg" style="left:65%;top:15%;animation-duration:2.5s;"></div>
  <div class="star-bg" style="left:80%;top:25%;animation-duration:3.5s;animation-delay:0.8s;"></div>
  <div class="star-bg" style="left:90%;top:5%;animation-duration:2s;animation-delay:1.5s;"></div>
  <div class="star-bg" style="left:55%;top:30%;animation-duration:5s;animation-delay:0.3s;"></div>
  <div class="star-bg" style="left:30%;top:40%;animation-duration:3s;animation-delay:2s;"></div>

  <div class="egg" style="width:55px;height:72px;background:#4FC3F7;left:8%;animation-duration:12s;animation-delay:0s;">
  </div>
  <div class="egg"
    style="width:40px;height:52px;background:#FFD166;left:22%;animation-duration:15s;animation-delay:3s;"></div>
  <div class="egg"
    style="width:65px;height:84px;background:#A8E6CF;left:55%;animation-duration:10s;animation-delay:1s;"></div>
  <div class="egg"
    style="width:35px;height:46px;background:#FF8FAB;left:75%;animation-duration:18s;animation-delay:5s;"></div>
  <div class="egg"
    style="width:50px;height:65px;background:#D4A5FF;left:88%;animation-duration:13s;animation-delay:2s;"></div>
  <div class="egg"
    style="width:42px;height:55px;background:#FFB347;left:40%;animation-duration:16s;animation-delay:7s;"></div>

  <div class="bunny-wrap">
    <svg class="bunny" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="100" rx="38" ry="34" fill="#F9E4D4" />
      <circle cx="60" cy="65" r="26" fill="#F9E4D4" />
      <ellipse cx="44" cy="32" rx="9" ry="22" fill="#F9E4D4" />
      <ellipse cx="44" cy="32" rx="5" ry="16" fill="#FFB6C1" />
      <ellipse cx="76" cy="32" rx="9" ry="22" fill="#F9E4D4" />
      <ellipse cx="76" cy="32" rx="5" ry="16" fill="#FFB6C1" />
      <circle cx="51" cy="61" r="4" fill="#4A3060" />
      <circle cx="69" cy="61" r="4" fill="#4A3060" />
      <circle cx="52.5" cy="59.5" r="1.5" fill="white" />
      <circle cx="70.5" cy="59.5" r="1.5" fill="white" />
      <ellipse cx="60" cy="70" rx="4" ry="3" fill="#FFB6C1" />
      <path d="M56 73 Q60 78 64 73" stroke="#E88FAB" stroke-width="1.5" fill="none" stroke-linecap="round" />
      <circle cx="46" cy="68" r="5" fill="#FFD6E8" opacity="0.6" />
      <circle cx="74" cy="68" r="5" fill="#FFD6E8" opacity="0.6" />
      <circle cx="92" cy="105" r="10" fill="white" />
      <ellipse cx="42" cy="128" rx="14" ry="9" fill="#F9E4D4" transform="rotate(-15 42 128)" />
      <ellipse cx="78" cy="128" rx="14" ry="9" fill="#F9E4D4" transform="rotate(15 78 128)" />
      <ellipse cx="60" cy="108" rx="12" ry="8" fill="#4FC3F7" />
      <path d="M48 108 Q60 116 72 108" stroke="#0277BD" stroke-width="2" fill="none" />
    </svg>
  </div>

  <div class="card">
    <div class="badge">🥚 CAÇA AO OVO DE PÁSCOA 🥚</div>
    <h1 class="title">Pista Nº 4 🚀</h1>
    <p class="subtitle">Lê com atenção e descobre a resposta!</p>

    <div class="clue-box">
      <span class="clue-icon">🪐</span>
      <p class="clue-text">
        Andamos à volta do sol,<br />numa dança sem fim.<br /><br />
        Já fomos <em>nove</em>, mas agora<br />o <em>Plutão</em> já não conta.<br /><br />
        Quantos planetas somos<br />no sistema solar?
      </p>

    </div>

    <div class="footer-eggs">🥚🐣🥚🐣🥚</div>
  </div>

  <script src="bunny.js"></script>
</body>

</html>
